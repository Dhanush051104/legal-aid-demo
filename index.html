<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Aid Committee - Demo Chatbot</title>
    <!-- Tailwind CSS for clean styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .chat-container { height: calc(100vh - 180px); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-slate-800 border-b border-slate-700 p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold text-teal-400">Legal Aid & Awareness Committee</h1>
        <p class="text-xs text-slate-400 mt-1">Interactive Prototype Gateway</p>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 max-w-2xl w-full mx-auto p-4 flex flex-col justify-between">
        <div id="chat-box" class="chat-container overflow-y-auto space-y-4 p-2 rounded-lg bg-slate-800/50 border border-slate-700/50 shadow-inner">
            <!-- Bot Welcome Message -->
            <div class="flex items-start gap-2 max-w-[80%]">
                <div class="bg-teal-600 text-white rounded-lg p-3 text-sm shadow">
                    Hello! Welcome to the Legal Aid Helpline. How can I assist you with your cyber safety queries today?
                </div>
            </div>
        </div>

        <!-- Input Field Form -->
        <form id="chat-form" class="mt-4 flex gap-2">
            <input type="text" id="user-input" 
                   class="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-teal-400 text-slate-100" 
                   placeholder="Type your question here..." required autocomplete="off">
            <button type="submit" class="bg-teal-500 hover:bg-teal-600 text-slate-900 font-medium px-5 py-3 rounded-lg text-sm transition shadow">
                Send
            </button>
        </form>
    </main>

    <!-- Script Logic -->
    <script>
        // Core FAQ Database
        const faqDatabase = [
            {
                keywords: ["suspicious link", "link", "fake link", "phishing"],
                answer: "Do not click the link. Verify the sender and report suspicious messages to the platform or cyber authorities."
            },
            {
                keywords: ["otp", "scammer", "shared otp", "one time password"],
                answer: "Immediately contact your bank, block your account if necessary, and report the incident to the Cyber Crime Helpline (1930)."
            },
            {
                keywords: ["hacked", "social media", "instagram", "facebook", "compromise"],
                answer: "Change your password immediately, enable two-factor authentication, and report the account compromise to the platform."
            },
            {
                keywords: ["lost money", "scam", "online scam", "complain", "fraud"],
                answer: "Report the fraud immediately by calling 1930 or filing a complaint on the National Cyber Crime Reporting Portal."
            },
            {
                keywords: ["evidence", "keep", "screenshots", "proof", "records"],
                answer: "Save screenshots, transaction details, messages, emails, and any other records related to the incident."
            }
        ];

        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        // Function to append messages to chat view
        function appendMessage(text, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? "flex justify-end" : "flex justify-start";
            
            const bubble = document.createElement('div');
            bubble.className = isUser 
                ? "bg-slate-700 text-slate-100 rounded-lg p-3 text-sm max-w-[80%] shadow border border-slate-600" 
                : "bg-teal-600 text-white rounded-lg p-3 text-sm max-w-[80%] shadow";
            
            bubble.innerText = text;
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
        }

        // Form handling logic
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const query = userInput.value.trim();
            if (!query) return;

            appendMessage(query, true);
            userInput.value = '';

            // Fallback default response
            let botReply = "I am a simple demo system. Please ask me about suspicious links, sharing OTPs, hacked accounts, financial scams, or saving evidence.";
            
            // Match keywords
            const lowerQuery = query.toLowerCase();
            for (const item of faqDatabase) {
                const match = item.keywords.some(keyword => lowerQuery.includes(keyword));
                if (match) {
                    botReply = item.answer;
                    break;
                }
            }

            // Simulate slight system response lag
            setTimeout(() => {
                appendMessage(botReply, false);
            }, 400);
        });
    </script>
</body>
</html>
